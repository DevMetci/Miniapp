<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOFİ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 32px 24px 28px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .brand {
            font-size: 52px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 2px;
        }

        .sub {
            font-size: 13px;
            font-weight: 600;
            color: #888888;
            text-align: center;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding-bottom: 18px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 22px;
        }

        .menu-item {
            background: #242424;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333333;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .menu-item:active {
            opacity: 0.7;
            transform: scale(0.97);
        }

        .menu-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item .left .icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-item .left .icon svg {
            width: 22px;
            height: 22px;
        }

        .menu-item .left .label {
            color: #e8edf5;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .menu-item .arrow {
            color: #555555;
            font-size: 24px;
            font-weight: 300;
            line-height: 1;
        }

        .footer-note {
            color: #3f3f3f;
            text-align: center;
            font-size: 12px;
            margin-top: 18px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="brand">SOFİ</div>
    <div class="sub">SOSYAL MEDYA İŞLEMLERİ</div>

    <!-- Bize Ulaşın → Telegram -->
    <div class="menu-item" id="telegramBtn">
        <div class="left">
            <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#aaaaaa" stroke-width="1.8"/>
                    <path d="M7.5 12L10.5 14.5L16.5 9" stroke="#aaaaaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10.5 14.5L12 19L16.5 9" stroke="#aaaaaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="label">Bize Ulaşın</span>
        </div>
        <span class="arrow">›</span>
    </div>

    <!-- Bana Ulaşın → WhatsApp -->
    <div class="menu-item" id="whatsappBtn">
        <div class="left">
            <span class="icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#aaaaaa" stroke-width="1.8"/>
                    <path d="M16 14.2C15.6 14.6 15 14.8 14.4 14.8C13.8 14.8 13.2 14.6 12.8 14.2L8.8 10.2C8.4 9.8 8.2 9.2 8.2 8.6C8.2 8 8.4 7.4 8.8 7L9.8 6C10.2 5.6 10.8 5.6 11.2 6L12.6 7.4C13 7.8 13 8.4 12.6 8.8L12 9.4" stroke="#aaaaaa" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M12 9.4L11.4 10C11 10.4 11 11 11.4 11.4L12.8 12.8C13.2 13.2 13.8 13.2 14.2 12.8L14.8 12.2" stroke="#aaaaaa" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M16 14.2L15 15.2C14.6 15.6 14 15.8 13.4 15.8C12.8 15.8 12.2 15.6 11.8 15.2L7.8 11.2C7.4 10.8 7.2 10.2 7.2 9.6C7.2 9 7.4 8.4 7.8 8L8.8 7" stroke="#aaaaaa" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="label">Bana Ulaşın</span>
        </div>
        <span class="arrow">›</span>
    </div>

    <div class="footer-note">•</div>
</div>

<script>
    document.getElementById('telegramBtn').addEventListener('click', function() {
        window.open('https://t.me/dehsetsi', '_blank');
    });

    document.getElementById('whatsappBtn').addEventListener('click', function() {
        window.open('https://wa.me/905350680449', '_blank');
    });
</script>

</body>
</html>
